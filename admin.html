<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About — MiniStore</title>


    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- Same CSS -->
    <link rel="stylesheet" href="ministore.css">

    <!-- external JS -->
    <script src="admin.js" defer></script>
</head>

<body>

    <div id="header">

        <div id="logo">MiniStore.</div>

        <div class="menu-btn" onclick="toggleMenu()">
            <i class="fa-solid fa-bars"></i>
        </div>

        <div class="nav" id="nav">

            <a href="index.html" class="nav-link">HOME</a>
            <a href="index.html#services" class="nav-link">SERVICE</a>
            <a href="index.html#products" class="nav-link">PRODUCTS</a>
            <a href="index.html#watch" class="nav-link">WATCHES</a>
            <a href="index.html#sale" class="nav-link">SALE</a>
            <a href="index.html#blog" class="nav-link">BLOG</a>



            <div class="dropdown">
                <a href="#">PAGES ▾</a>

                <div class="dropdown-content">
                    <a href="about.html">ABOUT US</a>
                    <a href="blog.html">BLOG</a>
                    <a href="shop.html">SHOP</a>
                    <a href="cart.html">CART</a>
                    <a href="checkout.html">CHECKOUT</a>
                    <a href="contact.html">CONTACT</a>
                    <a href="orders.html">ORDERS</a>
                </div>
            </div>
            <a href="admin.html" id="adminLink" style="display:none;">ADMIN</a>

        </div>

        <div class="icons">
            <a href="shop.html"><i class="fa-solid fa-magnifying-glass" title="Search"></i></a>
            <a href="cart.html"><i class="fa-solid fa-cart-shopping" title="Cart"></i></a>
            <a href="login.html"><i class="fa-solid fa-user" title="Login"></i></a>
            <a href="profile.html" id="username" title="Profile"></a>
        </div>

    </div>

    <section class="about-hero">

        <div class="about-hero-text">
            <h1>ADMIN</h1>

            <div class="breadcrumb">
                <a href="index.html">Home</a> > <span>Admin</span>
            </div>

        </div>

    </section>

    <section class="admin-page">
        <h2>Admin Panel - Orders</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Phone</th>
                        <th>Products</th>
                        <th>Total</th>
                        <th>Payment</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="adminOrders"></tbody>
            </table>
        </div>


        <h3>Add Product</h3>

        <div class="admin-form">
            <input type="text" id="pName" placeholder="Product Name">
            <input type="number" id="pPrice" placeholder="Price">
            <input type="text" id="pImage" placeholder="Image URL">

            <select id="sectionSelect">
                <option value="1">Phones</option>
                <option value="2">Watches</option>
            </select>

            <button onclick="addProduct()">Add Product</button>
        </div>

        <h3>All Products</h3>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Type</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="adminProducts"></tbody>
            </table>
        </div>
    </section>

</body>

</html>
